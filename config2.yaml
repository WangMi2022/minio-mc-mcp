# MinIO MC MCP Server 配置文件

# HTTP 服务器配置
host: "0.0.0.0"
port: 19001

# MinIO 连接配置
minioEndpoint: "192.168.0.1:9000"
minioAccessKey: "rustfsadmin"
minioSecretKey: "rustfsadmin"
minioAlias: "minio135"
minioSecure: false

# MC CLI 配置
mcPath: "./mc.exe"
commandTimeout: 30s

# 日志配置
logLevel: "info"
logFormat: "json"
logFile: ""

# 性能配置
maxConcurrentRequests: 100
requestTimeout: 30s

# 安全配置
apiToken: "minio-mcp-token-2026"
allowedOrigins:
  - "*"

# 缓存配置
enableCache: true
cacheTTL: 5m
